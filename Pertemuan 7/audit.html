<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit 5S - PT EduExo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Hapus atau perbaiki file style.css jika error MIME muncul -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <header class="brand-header text-center mb-4">
      <h1 class="fw-bold">PT EduExo Indonesia</h1>
      <p class="mb-3 fs-5">Form Checklist Audit 5S Area Kerja</p>
      <span
        class="badge bg-light text-dark px-3 py-2 fs-6 shadow-sm border border-secondary"
        >Penanggung Jawab: Nanik Wijayanti
      </span>
    </header>

    <div class="container mb-5">
      <div class="row">
        <!-- Form Input -->
        <div class="col-md-4 mb-4">
          <div class="card shadow-sm border-top border-primary border-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
              <h5 class="fw-bold text-dark">Form Inspeksi Harian</h5>
            </div>
            <div class="card-body">
              <form id="formAudit">
                <div class="mb-3">
                  <label
                    for="tanggalAudit"
                    class="form-label text-muted small fw-bold"
                    >TANGGAL INSPEKSI</label
                  >
                  <input
                    type="date"
                    id="tanggalAudit"
                    class="form-control bg-light"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label
                    for="shiftAudit"
                    class="form-label text-muted small fw-bold"
                    >SHIFT</label
                  >
                  <select
                    id="shiftAudit"
                    class="form-control bg-light"
                    required
                  >
                    <option value="">Pilih Shift...</option>
                    <option value="Pagi">Pagi</option>
                    <option value="Siang">Siang</option>
                    <option value="Malam">Malam</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label
                    for="namaAuditor"
                    class="form-label text-muted small fw-bold"
                    >NAMA AUDITOR</label
                  >
                  <input
                    type="text"
                    id="namaAuditor"
                    class="form-control bg-light"
                    placeholder="Nama Anda..."
                    required
                  />
                </div>

                <div class="p-3 bg-light border rounded mb-4">
                  <label
                    class="form-label text-primary small fw-bold mb-3 border-bottom pb-2 w-100"
                  >
                    ITEM PENILAIAN 5S
                  </label>

                  <div class="form-check mb-2">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiri"
                      id="check1"
                    />
                    <label class="form-check-label fw-bold" for="check1"
                      >1. Seiri (Ringkas)</label
                    >
                  </div>
                  <div class="form-check mb-2">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiton"
                      id="check2"
                    />
                    <label class="form-check-label fw-bold" for="check2"
                      >2. Seiton (Rapi)</label
                    >
                  </div>
                  <div class="form-check mb-2">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiso"
                      id="check3"
                    />
                    <label class="form-check-label fw-bold" for="check3"
                      >3. Seiso (Resik)</label
                    >
                  </div>
                  <div class="form-check mb-2">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiketsu"
                      id="check4"
                    />
                    <label class="form-check-label fw-bold" for="check4"
                      >4. Seiketsu (Rawat)</label
                    >
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Shitsuke"
                      id="check5"
                    />
                    <label class="form-check-label fw-bold" for="check5"
                      >5. Shitsuke (Rajin)</label
                    >
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 fw-bold rounded-pill"
                >
                  Simpan Hasil Audit
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Tabel Data Riwayat -->
        <div class="col-md-8">
          <div class="card shadow-sm border-0">
            <div
              class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0">Data Riwayat Audit</h5>
              <input
                type="text"
                id="inputCari"
                class="form-control form-control-sm w-50"
                placeholder="Cari nama auditor..."
              />
            </div>

            <div class="card-body p-0 border">
              <div class="table-responsive">
                <table class="table table-striped align-middle m-0">
                  <thead class="table-secondary">
                    <tr>
                      <th class="ps-3">Tanggal</th>
                      <th>Shift</th>
                      <th>Auditor</th>
                      <th>Skor</th>
                      <th>Detail 5S (Array Data)</th>
                      <th class="text-center">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="tabelBody5S"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center text-muted mt-auto py-4 border-top">
      <small
        >&copy; PT EduExo Indonesia | Penanggung Jawab: Nanik Wijayanti
      </small>
    </footer>

    <script src="audit.js" defer></script>
  </body>
</html>
