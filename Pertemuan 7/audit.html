<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Audit 5S - PT EduExo Indonesia</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS Tambahan -->
    <link rel="stylesheet" href="style.css" />

    <!-- Icon -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Header -->
    <header class="text-center py-4 mb-4 border-bottom bg-white shadow-sm">
      <h1 class="fw-bold mb-1">PT EduExo Indonesia</h1>
      <p class="mb-2">Formulir Checklist Audit 5S Area Kerja</p>
      <span class="badge bg-secondary">
        Penanggung Jawab: Nanik Wijayanti
      </span>
    </header>

    <!-- Konten Utama -->
    <main class="container mb-5">
      <div class="row">
        <!-- Form Input -->
        <div class="col-md-4 mb-4">
          <div class="card shadow-sm border-top border-primary border-4">
            <div class="card-header bg-white">
              <h5 class="fw-bold mb-0">Form Inspeksi Harian</h5>
            </div>

            <div class="card-body">
              <form id="formAudit">
                <!-- Tanggal -->
                <div class="mb-3">
                  <label for="tanggalAudit" class="form-label fw-semibold">
                    Tanggal Inspeksi
                  </label>
                  <input
                    type="date"
                    id="tanggalAudit"
                    class="form-control"
                    required
                  />
                </div>

                <!-- Shift -->
                <div class="mb-3">
                  <label for="shiftAudit" class="form-label fw-semibold">
                    Shift Kerja
                  </label>
                  <select id="shiftAudit" class="form-select" required>
                    <option value="">Pilih shift</option>
                    <option value="Pagi">Pagi</option>
                    <option value="Siang">Siang</option>
                    <option value="Malam">Malam</option>
                  </select>
                </div>

                <!-- Operator -->
                <div class="mb-4">
                  <label for="operatorAudit" class="form-label fw-semibold">
                    Operator
                  </label>
                  <select id="operatorAudit" class="form-select" required>
                    <option value="">Pilih operator</option>
                    <option value="1|Ahmad Santoso">
                      ID 001 - Ahmad Santoso
                    </option>
                    <option value="2|Budi Hartono">
                      ID 002 - Budi Hartono
                    </option>
                    <option value="3|Citra Dewi">ID 003 - Citra Dewi</option>
                    <option value="4|Dewi Lestari">
                      ID 004 - Dewi Lestari
                    </option>
                    <option value="5|Eko Prasetyo">
                      ID 005 - Eko Prasetyo
                    </option>
                    <option value="6|Fajar Nugroho">
                      ID 006 - Fajar Nugroho
                    </option>
                    <option value="7|Gita Ramadhani">
                      ID 007 - Gita Ramadhani
                    </option>
                    <option value="8|Hadi Wibowo">ID 008 - Hadi Wibowo</option>
                    <option value="9|Indah Sari">ID 009 - Indah Sari</option>
                    <option value="10|Joko Widodo">ID 010 - Joko Widodo</option>
                    <option value="11|Kartika Putri">
                      ID 011 - Kartika Putri
                    </option>
                    <option value="12|Larasati">ID 012 - Larasati</option>
                    <option value="13|Muhammad Ali">
                      ID 013 - Muhammad Ali
                    </option>
                    <option value="14|Nadia Fitri">ID 014 - Nadia Fitri</option>
                    <option value="15|Oscar Rahman">
                      ID 015 - Oscar Rahman
                    </option>
                    <option value="16|Putra Wijaya">
                      ID 016 - Putra Wijaya
                    </option>
                    <option value="17|Qori Andini">ID 017 - Qori Andini</option>
                    <option value="18|Rina Susanti">
                      ID 018 - Rina Susanti
                    </option>
                    <option value="19|Surya Pratama">
                      ID 019 - Surya Pratama
                    </option>
                    <option value="20|Tia Maharani">
                      ID 020 - Tia Maharani
                    </option>
                  </select>
                </div>

                <!-- Checklist 5S -->
                <div class="border rounded p-3 mb-4 bg-light">
                  <label class="fw-semibold text-primary mb-2 d-block">
                    Item Penilaian 5S
                  </label>

                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiri"
                      id="check1"
                    />
                    <label class="form-check-label" for="check1"
                      >Seiri (Ringkas)</label
                    >
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiton"
                      id="check2"
                    />
                    <label class="form-check-label" for="check2"
                      >Seiton (Rapi)</label
                    >
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiso"
                      id="check3"
                    />
                    <label class="form-check-label" for="check3"
                      >Seiso (Resik)</label
                    >
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Seiketsu"
                      id="check4"
                    />
                    <label class="form-check-label" for="check4"
                      >Seiketsu (Rawat)</label
                    >
                  </div>

                  <div class="form-check">
                    <input
                      class="form-check-input ceklis-5s"
                      type="checkbox"
                      value="Shitsuke"
                      id="check5"
                    />
                    <label class="form-check-label" for="check5"
                      >Shitsuke (Rajin)</label
                    >
                  </div>
                </div>

                <!-- Tombol -->
                <button type="submit" class="btn btn-primary w-100 fw-semibold">
                  Simpan Hasil Audit
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Tabel -->
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div
              class="card-header bg-dark text-white d-flex justify-content-between"
            >
              <h5 class="mb-0">Riwayat Audit</h5>
              <input
                type="text"
                id="inputCari"
                class="form-control form-control-sm w-50"
                placeholder="Cari operator"
              />
            </div>

            <div class="table-responsive">
              <table class="table table-striped mb-0">
                <thead class="table-secondary">
                  <tr>
                    <th>Tanggal</th>
                    <th>Shift</th>
                    <th>Operator</th>
                    <th>Skor</th>
                    <th>Detail</th>
                    <th class="text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="tabelBody5S"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-3 border-top bg-white mt-auto">
      <small>© PT EduExo Indonesia</small>
    </footer>
    <script src="audit.js"></script>
  </body>
</html>
