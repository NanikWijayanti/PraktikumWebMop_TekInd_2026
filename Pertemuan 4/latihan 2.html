<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Latihan 2 - Konversi Shift</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="latihan.css" />
    />

    <!-- CSS SENDIRI -->
    <link rel="stylesheet" href="latihan.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand">TekInd Systems</a>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- IDENTITAS -->
      <div class="row mb-4">
        <div class="col-md-12">
          <table class="table table-bordered">
            <tr>
              <th>Nama</th>
              <td>Nanik Wijayanti</td>
            </tr>

            <tr>
              <th>NIM</th>
              <td>23051430006</td>
            </tr>

            <tr>
              <th>Tugas</th>
              <td>Latihan 2 - Logika Switch (Konversi Shift)</td>
            </tr>
          </table>
        </div>
      </div>

      <!-- CARD INFO SHIFT -->
      <div class="row mb-4">
        <div class="col-md-4">
          <div class="card text-white bg-primary">
            <div class="card-header">Shift 1</div>

            <div class="card-body">
              <h5 class="card-title">Pagi</h5>
              <p class="card-text">07:00 - 15:00</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-white bg-success">
            <div class="card-header">Shift 2</div>

            <div class="card-body">
              <h5 class="card-title">Siang</h5>
              <p class="card-text">15:00 - 23:00</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card text-white bg-warning">
            <div class="card-header">Shift 3</div>

            <div class="card-body">
              <h5 class="card-title">Malam</h5>
              <p class="card-text">23:00 - 07:00</p>
            </div>
          </div>
        </div>
      </div>

      <!-- FORM INPUT -->
      <div class="row">
        <div class="col-md-6">
          <h3>Input Data Shift Operator</h3>

          <form>
            <div class="mb-3">
              <label class="form-label">Nama Operator</label>
              <input type="text" id="namaOperator" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Kode Shift (1 / 2 / 3)</label>
              <input type="number" id="kodeShift" class="form-control" />
            </div>

            <button type="button" class="btn btn-primary" onclick="cekShift()">
              Cek Shift
            </button>
          </form>
        </div>

        <!-- TABEL HASIL -->
        <div class="col-md-6">
          <h3>Hasil Konversi Shift</h3>

          <table class="table table-bordered">
            <thead class="table-dark">
              <tr>
                <th>Nama Operator</th>
                <th>Kode Shift</th>
                <th>Nama Shift</th>
              </tr>
            </thead>

            <tbody id="tabelShift">
              <tr>
                <td colspan="3" class="text-center">Belum ada data</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="latihan 2.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
